name: Test PR Labeling
on:
  pull_request_target:
    types: [opened]
jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Assign PR Labels
        uses: splunk-soar-connectors/.github/.github/actions/pr-labeling@fix/pr-labeling-jira-newapp
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repo-name: ${{ github.repository }}
          pr-number: ${{ github.event.pull_request.number }}
